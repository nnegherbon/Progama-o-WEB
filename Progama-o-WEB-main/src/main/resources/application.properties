server.port=8080
server.servlet.context-path=/api

spring.application.name=MONIFY - Sistema de Organizacao Financeira

# Perfil local padrao: H2 em arquivo para permitir executar a aplicacao imediatamente.
spring.datasource.url=jdbc:h2:file:./data/monify_db;MODE=PostgreSQL;DATABASE_TO_LOWER=TRUE;DEFAULT_NULL_ORDERING=HIGH
spring.datasource.driver-class-name=org.h2.Driver
spring.datasource.username=sa
spring.datasource.password=
spring.jpa.database-platform=org.hibernate.dialect.H2Dialect
spring.jpa.hibernate.ddl-auto=update
spring.jpa.show-sql=false
spring.h2.console.enabled=true
spring.h2.console.path=/h2-console

spring.jackson.serialization.write-dates-as-timestamps=false
spring.jackson.time-zone=America/Sao_Paulo

logging.level.com.monify=INFO
logging.level.org.hibernate.SQL=INFO
