# Local development database
# Defaults to H2 for quick local runs. To test against PostgreSQL locally,
# set DB_URL, DB_USERNAME and DB_PASSWORD before starting the app.
spring.datasource.url=${DB_URL:jdbc:h2:mem:monify-local-db;DB_CLOSE_DELAY=-1;DB_CLOSE_ON_EXIT=FALSE}
spring.datasource.username=${DB_USERNAME:sa}
spring.datasource.password=${DB_PASSWORD:}
spring.datasource.driver-class-name=${DB_DRIVER:org.h2.Driver}

# JPA/Hibernate
spring.jpa.database-platform=${DB_DIALECT:org.hibernate.dialect.H2Dialect}
spring.jpa.hibernate.ddl-auto=${JPA_DDL_AUTO:create-drop}
spring.jpa.show-sql=false

# H2 console
spring.h2.console.enabled=true
spring.h2.console.path=/h2-console
